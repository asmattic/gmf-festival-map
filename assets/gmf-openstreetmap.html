<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>GMF 2026 Interactive Map — Gasparilla Music Festival</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" crossorigin="">
<style>
:root {
  --gmf-orange: #E8711A;
  --gmf-orange-light: #F5923E;
  --gmf-navy: #2D2D5E;
  --gmf-peach: #F5DCC8;
  --gmf-gold: #F5C518;
  --gmf-teal: #1A9E7A;
  --gmf-pink: #E84B8A;
  --gmf-white: #FEFAF5;
  --gmf-dark: #1a1a2e;
  --gmf-dark-alpha: rgba(26,26,46,0.92);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow-card: 0 8px 32px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
  --shadow-pin: 0 3px 12px rgba(0,0,0,0.4);
  --blur: blur(16px);
  --font-display: 'Arial Narrow', 'Helvetica Neue Condensed', Impact, sans-serif;
  --font-body: -apple-system, 'Segoe UI', system-ui, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--font-body);
  background: var(--gmf-dark);
  color: var(--gmf-white);
}

/* ── MAP ─────────────────────────────────────────── */
#map {
  position: absolute;
  inset: 0;
  z-index: 1;
}

/* Override Leaflet controls */
.leaflet-control-zoom { border: none !important; box-shadow: var(--shadow-card) !important; border-radius: var(--radius-md) !important; overflow: hidden; }
.leaflet-control-zoom a { background: var(--gmf-dark-alpha) !important; color: var(--gmf-white) !important; backdrop-filter: var(--blur); border: none !important; width: 40px !important; height: 40px !important; line-height: 40px !important; font-size: 20px !important; font-weight: 600; }
.leaflet-control-zoom a:hover { background: var(--gmf-orange) !important; }
.leaflet-control-attribution { background: rgba(26,26,46,0.7) !important; color: rgba(255,255,255,0.5) !important; font-size: 10px; backdrop-filter: var(--blur); }
.leaflet-control-attribution a { color: rgba(255,255,255,0.6) !important; }
.leaflet-popup-content-wrapper { background: var(--gmf-dark-alpha); backdrop-filter: var(--blur); color: var(--gmf-white); border-radius: var(--radius-lg) !important; box-shadow: var(--shadow-card) !important; border: 1px solid rgba(255,255,255,0.1); }
.leaflet-popup-tip { background: var(--gmf-dark-alpha); }
.leaflet-popup-close-button { color: rgba(255,255,255,0.5) !important; font-size: 20px !important; top: 8px !important; right: 10px !important; }
.leaflet-popup-close-button:hover { color: var(--gmf-orange) !important; }

/* ── HEADER ──────────────────────────────────────── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: linear-gradient(180deg, var(--gmf-dark-alpha) 0%, rgba(26,26,46,0.8) 75%, transparent 100%);
  padding: 12px 14px 22px;
  pointer-events: none;
}
.header > * { pointer-events: auto; }

.header-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-logo {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--gmf-orange);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 13px;
  color: white;
  letter-spacing: -0.5px;
  border: 2px solid rgba(255,255,255,0.2);
  flex-shrink: 0;
}
.brand-text h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 18px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  line-height: 1.1;
}
.brand-text h1 span { color: var(--gmf-orange); }
.brand-text p {
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.2px;
}
.header-actions { display: flex; gap: 6px; }
.action-btn {
  height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(26,26,46,0.7);
  backdrop-filter: var(--blur);
  color: var(--gmf-white);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 0 12px;
  transition: all 0.15s;
  white-space: nowrap;
}
.action-btn:hover { background: var(--gmf-orange); border-color: var(--gmf-orange); }
.action-btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

/* ── FILTER BAR ──────────────────────────────────── */
.filter-bar {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.filter-bar::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px 13px;
  border-radius: var(--radius-xl);
  border: 1.5px solid rgba(255,255,255,0.1);
  background: rgba(26,26,46,0.65);
  backdrop-filter: var(--blur);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  white-space: nowrap;
  user-select: none;
}
.chip:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.85); }
.chip.active { background: rgba(232,113,26,0.18); border-color: var(--gmf-orange); color: var(--gmf-white); }
.chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.chip.active .dot { box-shadow: 0 0 8px 1px var(--gmf-orange); }

/* ── POPUP CONTENT ───────────────────────────────── */
.popup-inner { padding: 4px 2px; min-width: 220px; max-width: 280px; }
.popup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.popup-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.popup-icon img { width: 28px; height: 28px; object-fit: contain; }
.popup-icon svg { width: 20px; height: 20px; fill: white; }
.popup-name {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 17px;
  text-transform: uppercase;
  letter-spacing: 0.2px;
  line-height: 1.15;
}
.popup-category {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.popup-desc {
  font-size: 13px;
  line-height: 1.55;
  color: rgba(255,255,255,0.65);
  margin-bottom: 10px;
}
.popup-coords {
  font-size: 10px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: rgba(255,255,255,0.3);
  margin-bottom: 8px;
}
.popup-actions { display: flex; gap: 6px; }
.popup-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color: var(--gmf-white);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  font-family: var(--font-body);
}
.popup-btn:hover { background: var(--gmf-orange); border-color: var(--gmf-orange); }
.popup-btn svg { width: 14px; height: 14px; fill: currentColor; }
.popup-btn.primary { background: rgba(232,113,26,0.2); border-color: var(--gmf-orange); color: var(--gmf-orange); }
.popup-btn.primary:hover { background: var(--gmf-orange); color: white; }

/* ── CUSTOM MARKERS ──────────────────────────────── */
.gmf-marker {
  display: flex;
  flex-direction: column;
  align-items: center;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4));
  transition: transform 0.15s, filter 0.15s;
  cursor: pointer;
}
.gmf-marker:hover { transform: scale(1.12); filter: drop-shadow(0 5px 12px rgba(0,0,0,0.5)); }
.gmf-pin {
  width: 36px; height: 36px;
  border-radius: 50% 50% 50% 4px;
  transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  border: 2.5px solid rgba(255,255,255,0.85);
}
.gmf-pin svg, .gmf-pin img { transform: rotate(45deg); }
.gmf-pin svg { width: 18px; height: 18px; fill: white; }
.gmf-pin img { width: 22px; height: 22px; object-fit: contain; }
.gmf-pin.stage { width: 44px; height: 44px; border-width: 3px; }
.gmf-pin.stage svg { width: 22px; height: 22px; }
.gmf-label {
  margin-top: 3px;
  padding: 2px 7px;
  background: var(--gmf-dark-alpha);
  border-radius: 5px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 10px;
  color: white;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  white-space: nowrap;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
  line-height: 1.3;
}
.gmf-label.stage-label {
  font-size: 12px;
  padding: 2px 9px;
  background: rgba(232,113,26,0.9);
  border-color: rgba(255,255,255,0.2);
}

/* ── TOAST ───────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--gmf-teal);
  color: white;
  padding: 10px 24px;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 600;
  z-index: 2000;
  box-shadow: var(--shadow-card);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.35s;
  opacity: 0;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── LEGEND PANEL ────────────────────────────────── */
.legend-panel {
  position: fixed;
  bottom: 24px; left: 14px;
  z-index: 1000;
  background: var(--gmf-dark-alpha);
  backdrop-filter: var(--blur);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  box-shadow: var(--shadow-card);
  max-height: 50vh;
  overflow-y: auto;
  display: none;
  min-width: 200px;
}
.legend-panel.open { display: block; }
.legend-panel h3 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 10px;
  color: var(--gmf-orange);
}
.legend-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0;
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
}
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.3); }
.legend-count { margin-left: auto; font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 600; }

/* ── OVERLAY CONTROLS ─────────────────────────────── */
.overlay-controls {
  position: fixed;
  bottom: 24px; right: 60px;
  z-index: 1000;
  background: var(--gmf-dark-alpha);
  backdrop-filter: var(--blur);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  box-shadow: var(--shadow-card);
  display: none;
  align-items: center;
  gap: 10px;
}
.overlay-controls.open { display: flex; }
.overlay-controls label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
}
.overlay-controls input[type="range"] {
  width: 100px;
  accent-color: var(--gmf-orange);
  cursor: pointer;
}
.overlay-controls span {
  font-size: 11px;
  font-weight: 600;
  color: var(--gmf-orange);
  min-width: 32px;
  text-align: right;
}
.action-btn.active {
  background: var(--gmf-orange) !important;
  border-color: var(--gmf-orange) !important;
}

@media (min-width: 768px) {
  .header { padding: 16px 20px 26px; }
  .brand-text h1 { font-size: 22px; }
  .brand-logo { width: 42px; height: 42px; font-size: 15px; }
  .gmf-pin { width: 40px; height: 40px; }
  .gmf-pin svg { width: 20px; height: 20px; }
  .gmf-pin.stage { width: 50px; height: 50px; }
  .gmf-pin.stage svg { width: 24px; height: 24px; }
  .gmf-label { font-size: 11px; }
  .gmf-label.stage-label { font-size: 13px; }
}
</style>
</head>
<body>

<div id="map"></div>

<header class="header">
  <div class="header-bar">
    <div class="brand">
      <div class="brand-logo">GMF</div>
      <div class="brand-text">
        <h1><span>Gasparilla</span> Music Fest</h1>
        <p>Meridian Fields, Tampa · April 10–12, 2026</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="action-btn" id="overlayBtn" onclick="toggleOverlay()" title="Toggle site map overlay">
        <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
        MAP
      </button>
      <button class="action-btn" onclick="toggleLegend()" title="Legend">
        <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      </button>
      <button class="action-btn" onclick="resetView()" title="Reset view">
        <svg viewBox="0 0 24 24"><path d="M12 8V4l-5 5 5 5v-4c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        FIT
      </button>
    </div>
  </div>
  <div class="filter-bar" id="filterBar"></div>
</header>

<div class="legend-panel" id="legendPanel"></div>

<div class="overlay-controls" id="overlayControls">
  <label>Opacity</label>
  <input type="range" id="overlayOpacity" min="0" max="100" value="55" oninput="setOverlayOpacity(this.value)">
  <span id="opacityVal">55%</span>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" crossorigin=""></script>
<script>

// ─── MARKERS ────────────────────────────────────────────────
function svgIcon(catKey) {
  return `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${ICONS_SVG[CATEGORIES[catKey]?.icon || 'area']}</svg>`;
}

function createMarkers() {
  LOCATIONS.forEach(loc => {
    const catKey = CAT_MAP[loc.cat] || 'blank';
    const cat = CATEGORIES[catKey];
    const isStage = catKey === 'stage';

    const html = `
      <div class="gmf-marker">
        <div class="gmf-pin ${isStage ? 'stage' : ''}" style="background:${cat.color}">
          ${svgIcon(catKey)}
        </div>
        <div class="gmf-label ${isStage ? 'stage-label' : ''}">${loc.name}</div>
      </div>
    `;

    const icon = L.divIcon({
      html: html,
      className: '',
      iconSize: isStage ? [80, 62] : [70, 54],
      iconAnchor: isStage ? [40, 50] : [35, 44],
      popupAnchor: [0, isStage ? -50 : -44],
    });

    const marker = L.marker([loc.lat, loc.lng], { icon })
      .bindPopup(() => buildPopup(loc, catKey, cat), {
        maxWidth: 300, minWidth: 240, closeButton: true,
      });

    marker._gmfCat = catKey;
    marker._gmfData = loc;
    markers.push(marker);
    marker.addTo(map);
  });
}

function buildPopup(loc, catKey, cat) {
  const coordStr = `${loc.lat.toFixed(6)}, ${loc.lng.toFixed(6)}`;
  const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}`;
  const shareText = `Hanging out at the ${loc.name} at Gasparilla Music Festival 2026! gasparillamusic.com`;

  return `
    <div class="popup-inner">
      <div class="popup-header">
        <div class="popup-icon" style="background:${cat.color}">
          <svg viewBox="0 0 24 24" fill="white">${ICONS_SVG[cat.icon]}</svg>
        </div>
        <div>
          <div class="popup-name">${loc.name}</div>
          <div class="popup-category">${cat.label}</div>
        </div>
      </div>
      <div class="popup-desc">${loc.desc}</div>
      <div class="popup-coords">${coordStr}</div>
      <div class="popup-actions">
        <a class="popup-btn primary" href="${mapsUrl}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M21.71 11.29l-9-9a.996.996 0 0 0-1.41 0l-9 9a.996.996 0 0 0 0 1.41l9 9c.39.39 1.02.39 1.41 0l9-9a.996.996 0 0 0 0-1.41zM14 14.5V12h-4v3H8v-4c0-.55.45-1 1-1h5V7.5l3.5 3.5-3.5 3.5z"/></svg>
          Directions
        </a>
        <button class="popup-btn" onclick="shareLoc('${shareText.replace(/'/g, "\\'")}')">
          <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
          Share
        </button>
      </div>
    </div>
  `;
}

// ─── FILTERS ────────────────────────────────────────────────
function renderFilters() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '';

  // All chip
  const allChip = makeChip('All', '#E8711A', activeFilters.size === Object.keys(CATEGORIES).length);
  allChip.onclick = () => { activeFilters = new Set(Object.keys(CATEGORIES)); renderFilters(); applyFilters(); };
  bar.appendChild(allChip);

  Object.entries(CATEGORIES)
    .sort((a, b) => a[1].order - b[1].order)
    .forEach(([key, cat]) => {
      // Skip categories with no locations
      if (!LOCATIONS.some(l => (CAT_MAP[l.cat] || 'blank') === key)) return;
      const chip = makeChip(cat.label, cat.color, activeFilters.has(key));
      chip.onclick = () => {
        if (activeFilters.size === Object.keys(CATEGORIES).length) {
          activeFilters = new Set([key]);
        } else if (activeFilters.has(key) && activeFilters.size === 1) {
          activeFilters = new Set(Object.keys(CATEGORIES));
        } else if (activeFilters.has(key)) {
          activeFilters.delete(key);
        } else {
          activeFilters.add(key);
        }
        renderFilters();
        applyFilters();
      };
      bar.appendChild(chip);
    });
}

function makeChip(label, color, active) {
  const el = document.createElement('div');
  el.className = 'chip' + (active ? ' active' : '');
  el.innerHTML = `<span class="dot" style="background:${color}"></span>${label}`;
  return el;
}

function applyFilters() {
  markers.forEach(m => {
    if (activeFilters.has(m._gmfCat)) {
      if (!map.hasLayer(m)) m.addTo(map);
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  });
}

// ─── LEGEND ─────────────────────────────────────────────────
function renderLegend() {
  const panel = document.getElementById('legendPanel');
  const counts = {};
  LOCATIONS.forEach(l => {
    const k = CAT_MAP[l.cat] || 'blank';
    counts[k] = (counts[k] || 0) + 1;
  });

  let html = '<h3>Map Legend</h3>';
  Object.entries(CATEGORIES)
    .sort((a, b) => a[1].order - b[1].order)
    .forEach(([key, cat]) => {
      if (!counts[key]) return;
      html += `<div class="legend-item"><span class="legend-dot" style="background:${cat.color}"></span>${cat.label}<span class="legend-count">${counts[key]}</span></div>`;
    });
  html += `<div style="margin-top:10px;font-size:10px;color:rgba(255,255,255,0.3)">22 locations · Grandstand data</div>`;
  panel.innerHTML = html;
}

function toggleLegend() {
  legendOpen = !legendOpen;
  document.getElementById('legendPanel').classList.toggle('open', legendOpen);
}

// ─── OVERLAY ────────────────────────────────────────────────
function toggleOverlay() {
  overlayVisible = !overlayVisible;
  const btn = document.getElementById('overlayBtn');
  const controls = document.getElementById('overlayControls');
  if (overlayVisible) {
    siteMapOverlay.addTo(map);
    btn.classList.add('active');
    controls.classList.add('open');
  } else {
    map.removeLayer(siteMapOverlay);
    btn.classList.remove('active');
    controls.classList.remove('open');
  }
}

function setOverlayOpacity(val) {
  const opacity = val / 100;
  siteMapOverlay.setOpacity(opacity);
  document.getElementById('opacityVal').textContent = val + '%';
}

// ─── UTILS ──────────────────────────────────────────────────
function resetView() {
  map.flyTo(MAP_CENTER, MAP_ZOOM, { duration: 0.8 });
}

function shareLoc(text) {
  if (navigator.share) {
    navigator.share({ text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── BOOT ───────────────────────────────────────────────────
initMap();
</script>
